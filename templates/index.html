<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube → MP3</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 520px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .logo svg { width: 36px; height: 36px; }
        h1 { font-size: 22px; color: #1a1a1a; }
        .subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 28px;
            line-height: 1.6;
        }
        input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #e5e5e5;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 12px;
            color: #333;
        }
        input:focus { border-color: #ff0000; }
        input::placeholder { color: #bbb; }
        button {
            width: 100%;
            padding: 14px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) { background: #d90000; }
        button:disabled { background: #ddd; cursor: not-allowed; }

        /* 진행률 영역 */
        .progress-area {
            margin-top: 20px;
            display: none;
        }
        .progress-area.visible { display: block; }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #555;
            margin-bottom: 8px;
        }
        .progress-label .stage { font-weight: 600; }
        .progress-label .meta { color: #aaa; font-size: 12px; }
        .bar-bg {
            background: #f0f0f0;
            border-radius: 99px;
            height: 10px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff6b6b);
            border-radius: 99px;
            width: 0%;
            transition: width 0.4s ease;
        }
        .bar-fill.converting {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* 상태 메시지 */
        .status {
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.5;
            display: none;
        }
        .status.success { background: #e8f5e9; color: #1b5e20; display: block; }
        .status.error   { background: #fce4ec; color: #880e2f; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <svg viewBox="0 0 36 36" fill="none">
                <rect width="36" height="36" rx="8" fill="#FF0000"/>
                <polygon points="14,11 26,18 14,25" fill="white"/>
            </svg>
            <h1>YouTube → MP3</h1>
        </div>
        <p class="subtitle">
            YouTube URL을 붙여넣고 버튼을 누르세요.<br>
            변환된 MP3 파일은 <strong>Downloads 폴더</strong>에 저장됩니다.
        </p>

        <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." autofocus />
        <button id="convertBtn" onclick="startConvert()">MP3로 변환하기</button>

        <div class="progress-area" id="progressArea">
            <div class="progress-label">
                <span class="stage" id="stageText">준비 중...</span>
                <span class="meta" id="metaText"></span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill" id="barFill"></div>
            </div>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
        async function startConvert() {
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('convertBtn');
            const status = document.getElementById('status');

            if (!url) {
                showStatus('error', 'URL을 입력해주세요.');
                return;
            }

            // 초기화
            status.className = 'status';
            status.textContent = '';
            btn.disabled = true;
            btn.textContent = '변환 중...';
            showProgress(0, '시작 중...', '');

            try {
                const res = await fetch('/convert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const { job_id, error } = await res.json();

                if (!job_id) {
                    throw new Error(error || '알 수 없는 오류');
                }

                // SSE로 진행률 수신
                const evtSource = new EventSource(`/progress/${job_id}`);
                evtSource.onmessage = (e) => {
                    const data = JSON.parse(e.data);

                    if (data.status === 'downloading') {
                        const meta = [data.speed, data.eta ? `남은 시간 ${data.eta}` : ''].filter(Boolean).join(' · ');
                        showProgress(data.percent, `다운로드 중... ${data.percent}%`, meta);

                    } else if (data.status === 'converting') {
                        showProgress(100, 'MP3 변환 중...', '', true);

                    } else if (data.status === 'done') {
                        evtSource.close();
                        hideProgress();
                        showStatus('success', `✓ 완료! "${data.title}.mp3" 파일이 Downloads 폴더에 저장되었습니다.`);
                        document.getElementById('urlInput').value = '';
                        btn.disabled = false;
                        btn.textContent = 'MP3로 변환하기';

                    } else if (data.status === 'error') {
                        evtSource.close();
                        hideProgress();
                        showStatus('error', '오류: ' + data.error);
                        btn.disabled = false;
                        btn.textContent = 'MP3로 변환하기';
                    }
                };

                evtSource.onerror = () => {
                    evtSource.close();
                    hideProgress();
                    showStatus('error', '서버 연결이 끊어졌습니다.');
                    btn.disabled = false;
                    btn.textContent = 'MP3로 변환하기';
                };

            } catch (e) {
                hideProgress();
                showStatus('error', '오류: ' + e.message);
                btn.disabled = false;
                btn.textContent = 'MP3로 변환하기';
            }
        }

        function showProgress(percent, stage, meta, isConverting = false) {
            document.getElementById('progressArea').classList.add('visible');
            document.getElementById('stageText').textContent = stage;
            document.getElementById('metaText').textContent = meta;
            const bar = document.getElementById('barFill');
            bar.style.width = percent + '%';
            bar.className = 'bar-fill' + (isConverting ? ' converting' : '');
        }

        function hideProgress() {
            document.getElementById('progressArea').classList.remove('visible');
        }

        function showStatus(type, msg) {
            const el = document.getElementById('status');
            el.className = 'status ' + type;
            el.textContent = msg;
        }

        document.getElementById('urlInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') startConvert();
        });
    </script>
</body>
</html>
